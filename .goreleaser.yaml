version: 2

project_name: hvt

builds:
  - main: .
    binary: hvt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: nqui
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/nqui/vault-tui"
    description: "A TUI for browsing HashiCorp Vault"
    license: "MIT"
    install: |
      bin.install "hvt"
    test: |
      assert_match version.to_s, shell_output("#{bin}/hvt --version", 2)
